<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- SMPPServer owns its service name, calls Auth and Client services -->
  <policy user="smpp-server">
    <allow own="com.telecom.smpp.Server"/>
    <allow send_destination="com.telecom.smpp.Auth"/>
    <allow send_destination="com.telecom.smpp.Client.*"/>
  </policy>

  <!-- AuthService owns its service name -->
  <policy user="smpp-auth">
    <allow own="com.telecom.smpp.Auth"/>
  </policy>

  <!-- SmppClientHandler owns per-session name, calls Server and Auth -->
  <policy user="smpp-client">
    <allow own="com.telecom.smpp.Client.*"/>
    <allow send_destination="com.telecom.smpp.Server"/>
    <allow send_destination="com.telecom.smpp.Auth"/>
  </policy>

  <!-- Deny all other access by default -->
  <policy context="default">
    <deny send_destination="com.telecom.smpp.*"/>
  </policy>

</busconfig>
